description: "AI 자동화 프로젝트 프롬프트 품질 테스트 (Harness)"

# 1. 사용할 모델 (Provider) 지정
# 여기서는 로컬 환경의 Ollama 모델을 사용합니다.
providers:
  - ollama:chat:llama3

# 2. 테스트할 프롬프트(지시문) 지정
# 여러 프롬프트를 비교하여 어떤 것이 더 좋은 결과를 내는지 평가할 수 있습니다.
prompts:
  - >
    You are an expert knowledge assistant. Summarize the following text in 3 bullet points.
    Text: {{text}}
  - >
    Read the following text and provide a concise summary using exactly 3 bullet points.
    Text: {{text}}

# 3. 테스트할 데이터셋(입력값) 및 평가 기준 지정
tests:
  - vars:
      text: "프롬프트 엔지니어링은 AI 모델이 원하는 결과물을 출력하도록 지시문을 최적화하는 과정입니다. 이를 통해 일관성 있고 정확한 답변을 얻을 수 있습니다. 반복적인 테스트와 수정이 필수적입니다."
    assert:
      - type: icontains
        value: "프롬프트 엔지니어링"
      - type: javascript
        value: "output.split('\\n').filter(line => line.trim().startsWith('-') || line.trim().startsWith('*')).length === 3"
        # 3개의 불릿 포인트가 있는지 확인하는 테스트

  - vars:
      text: "Ollama는 맥북과 같은 로컬 환경에서 대규모 언어 모델을 쉽게 실행할 수 있게 해주는 훌륭한 도구입니다. 오프라인에서도 작동하며 프라이버시를 완벽히 보호합니다."
    assert:
      - type: icontains
        value: "프라이버시"
